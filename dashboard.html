<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — OIR Practice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard</h1>
            <p>Your progress at a glance</p>
            <p class="personal">Bhavisha · Target: May 4, 2026</p>
        </div>

        <div class="dashboard-content">
            <!-- Overall Stats -->
            <section class="dashboard-section">
                <h2>Overall</h2>
                <div id="overallStats" class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Tests</div>
                        <div class="stat-value" id="testsTaken">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Unique</div>
                        <div class="stat-value" id="uniqueTests">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Average</div>
                        <div class="stat-value" id="avgScore">–</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Best</div>
                        <div class="stat-value" id="bestScore">–</div>
                    </div>
                </div>
            </section>

            <!-- Test History -->
            <section class="dashboard-section">
                <h2>History</h2>
                <div id="testHistory" class="test-history">
                    <!-- History will be injected here -->
                </div>
            </section>

            <!-- Section-wise Performance -->
            <section class="dashboard-section">
                <h2>Performance by Section</h2>
                <div id="sectionPerformance" class="section-performance">
                    <!-- Section stats will be injected here -->
                </div>
            </section>

            <!-- Actions -->
            <section class="dashboard-actions">
                <button class="btn-primary" onclick="exportToCSV()">
                    Export CSV
                </button>
                <button class="btn-secondary" onclick="location.href='index.html'">
                    Home
                </button>
                <button class="btn-danger" onclick="resetAllProgress()">
                    Reset Data
                </button>
            </section>
        </div>

        <div class="footer">
            <p>Created with 🧈 by Tofu</p>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
        });

        function loadDashboard() {
            const results = getTestResults();
            
            if (results.length === 0) {
                document.getElementById('testHistory').innerHTML = `
                    <div class="empty-state">
                        <p>No tests taken yet.</p>
                        <p><a href="index.html">Start your first test →</a></p>
                    </div>
                `;
                return;
            }

            // Load overall stats
            const stats = getOverallStats();
            document.getElementById('testsTaken').textContent = stats.testsTaken;
            document.getElementById('uniqueTests').textContent = stats.uniqueTests;
            document.getElementById('avgScore').textContent = stats.avgScore + '%';
            document.getElementById('bestScore').textContent = stats.bestScore + '/50';

            // Load test history (most recent first)
            const historyDiv = document.getElementById('testHistory');
            historyDiv.innerHTML = '';
            
            const sortedResults = results.sort((a, b) => b.timestamp - a.timestamp);
            
            sortedResults.forEach(result => {
                const date = new Date(result.timestamp).toLocaleString('en-IN', {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });
                
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-header">
                        <h3>${result.testTitle}</h3>
                        <span class="history-date">${date}</span>
                    </div>
                    <div class="history-body">
                        <div class="history-score">
                            <strong>${result.score}/50 (${result.percentage}%)</strong>
                        </div>
                        <div class="history-time">
                            ${Math.floor(result.timeTaken / 60)}m ${result.timeTaken % 60}s
                        </div>
                        <div class="history-sections">
                            ${Object.entries(result.sectionScores).map(([section, data]) => `
                                <span class="section-badge">${section}: ${data.score}/${data.total}</span>
                            `).join('')}
                        </div>
                    </div>
                `;
                historyDiv.appendChild(historyItem);
            });

            // Load section-wise performance
            const sectionDiv = document.getElementById('sectionPerformance');
            const sectionTotals = stats.sectionPerformance;
            
            sectionDiv.innerHTML = '';
            Object.entries(sectionTotals).forEach(([section, data]) => {
                const percentage = ((data.correct / data.total) * 100).toFixed(1);
                const sectionCard = document.createElement('div');
                sectionCard.className = 'section-card';
                sectionCard.innerHTML = `
                    <h3>${section}</h3>
                    <div class="section-score">${data.correct}/${data.total}</div>
                    <div class="section-percentage">${percentage}%</div>
                    <div class="section-bar">
                        <div class="section-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                `;
                sectionDiv.appendChild(sectionCard);
            });
        }
    </script>
</body>
</html>
