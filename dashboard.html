<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — OIR Practice</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Dashboard-specific refinements */
        .dashboard-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .hero-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1rem;
            text-align: center;
        }
        .hero-card.primary {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
            position: relative;
            overflow: hidden;
        }
        .hero-card.primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 65% 25%, rgba(196,93,62,0.18) 0%, transparent 55%);
            pointer-events: none;
        }
        .hero-card-label {
            font-size: 0.5625rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.5;
            margin-bottom: 0.25rem;
            font-weight: 500;
            position: relative;
        }
        .hero-card-value {
            font-family: var(--font-mono);
            font-size: 1.75rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            position: relative;
            line-height: 1.2;
        }
        .hero-card-sub {
            font-size: 0.6875rem;
            opacity: 0.45;
            margin-top: 0.25rem;
            position: relative;
        }
        .weak-callout {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: var(--radius);
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .weak-callout-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        .weak-callout-text {
            font-size: 0.8125rem;
            color: var(--warning-text);
            line-height: 1.5;
        }
        .weak-callout-text strong {
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .dashboard-hero {
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
            }
            .hero-card {
                padding: 1rem 0.75rem;
            }
            .hero-card-value {
                font-size: 1.375rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dashboard</h1>
            <p>Your progress at a glance</p>
            <p class="personal">Bhavisha · Target: May 4, 2026</p>
        </div>

        <div class="dashboard-content">
            <!-- Hero Stats -->
            <div class="dashboard-hero" id="dashboardHero" style="display: none;">
                <div class="hero-card primary">
                    <div class="hero-card-label">Average Score</div>
                    <div class="hero-card-value" id="heroAvg">–</div>
                </div>
                <div class="hero-card primary">
                    <div class="hero-card-label">Best Score</div>
                    <div class="hero-card-value" id="heroBest">–</div>
                    <div class="hero-card-sub" id="heroBestTest"></div>
                </div>
                <div class="hero-card">
                    <div class="hero-card-label">Tests Taken</div>
                    <div class="hero-card-value" id="testsTaken">0</div>
                </div>
                <div class="hero-card">
                    <div class="hero-card-label">Unique Tests</div>
                    <div class="hero-card-value" id="uniqueTests">0</div>
                    <div class="hero-card-sub" id="heroRemaining"></div>
                </div>
            </div>

            <!-- Weakness Callout -->
            <div class="weak-callout" id="weakCallout" style="display: none;">
                <span class="weak-callout-icon">⚡</span>
                <div class="weak-callout-text">
                    Focus area: <strong id="weakSection">–</strong> — <span id="weakPct">–</span>
                </div>
            </div>

            <!-- Overall Stats (hidden, kept for JS compatibility) -->
            <div id="overallStats" style="display: none;">
                <div id="avgScore"></div>
                <div id="bestScore"></div>
            </div>

            <!-- Test History -->
            <section class="dashboard-section">
                <h2>History</h2>
                <div id="testHistory" class="test-history">
                    <!-- History will be injected here -->
                </div>
            </section>

            <!-- Section-wise Performance -->
            <section class="dashboard-section">
                <h2>Performance by Section</h2>
                <div id="sectionPerformance" class="section-performance">
                    <!-- Section stats will be injected here -->
                </div>
            </section>

            <!-- Actions -->
            <section class="dashboard-actions">
                <button class="btn-primary" onclick="exportToCSV()">
                    Export CSV
                </button>
                <button class="btn-secondary" onclick="location.href='index.html'">
                    Home
                </button>
                <button class="btn-danger" onclick="resetAllProgress()">
                    Reset Data
                </button>
            </section>
        </div>

        <div class="footer">
            <p>Created with 🧈 by Tofu</p>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
        });

        function loadDashboard() {
            const results = getTestResults();
            
            if (results.length === 0) {
                document.getElementById('testHistory').innerHTML = `
                    <div class="empty-state">
                        <p>No tests taken yet.</p>
                        <p><a href="index.html">Start your first test →</a></p>
                    </div>
                `;
                return;
            }

            // Load hero stats
            const stats = getOverallStats();
            const heroEl = document.getElementById('dashboardHero');
            heroEl.style.display = 'grid';

            document.getElementById('heroAvg').textContent = stats.avgScore + '%';
            document.getElementById('heroBest').textContent = stats.bestScore + '/50';
            document.getElementById('heroBestTest').textContent = stats.bestTest || '';
            document.getElementById('testsTaken').textContent = stats.testsTaken;
            document.getElementById('uniqueTests').textContent = stats.uniqueTests;
            document.getElementById('heroRemaining').textContent = (20 - stats.uniqueTests) + ' remaining';

            // Weakness callout
            if (stats.weakestSection) {
                const weakEl = document.getElementById('weakCallout');
                weakEl.style.display = 'flex';
                document.getElementById('weakSection').textContent = stats.weakestSection;
                document.getElementById('weakPct').textContent = stats.weakestPct + '% accuracy';
            }

            // Hidden fields for compatibility
            document.getElementById('avgScore').textContent = stats.avgScore + '%';
            document.getElementById('bestScore').textContent = stats.bestScore + '/50';

            // Load test history (most recent first)
            const historyDiv = document.getElementById('testHistory');
            historyDiv.innerHTML = '';
            
            const sortedResults = results.sort((a, b) => b.timestamp - a.timestamp);
            
            sortedResults.forEach(result => {
                const date = new Date(result.timestamp).toLocaleString('en-IN', {
                    dateStyle: 'medium',
                    timeStyle: 'short'
                });
                
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-header">
                        <h3>${result.testTitle}</h3>
                        <span class="history-date">${date}</span>
                    </div>
                    <div class="history-body">
                        <div class="history-score">
                            <strong>${result.score}/50 (${result.percentage}%)</strong>
                        </div>
                        <div class="history-time">
                            ${Math.floor(result.timeTaken / 60)}m ${result.timeTaken % 60}s
                        </div>
                        <div class="history-sections">
                            ${Object.entries(result.sectionScores).map(([section, data]) => `
                                <span class="section-badge">${section}: ${data.score}/${data.total}</span>
                            `).join('')}
                        </div>
                    </div>
                `;
                historyDiv.appendChild(historyItem);
            });

            // Load section-wise performance
            const sectionDiv = document.getElementById('sectionPerformance');
            const sectionTotals = stats.sectionPerformance;
            
            sectionDiv.innerHTML = '';
            Object.entries(sectionTotals).forEach(([section, data]) => {
                const percentage = ((data.correct / data.total) * 100).toFixed(1);
                const sectionCard = document.createElement('div');
                sectionCard.className = 'section-card';
                sectionCard.innerHTML = `
                    <h3>${section}</h3>
                    <div class="section-score">${data.correct}/${data.total}</div>
                    <div class="section-percentage">${percentage}%</div>
                    <div class="section-bar">
                        <div class="section-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                `;
                sectionDiv.appendChild(sectionCard);
            });
        }
    </script>
</body>
</html>
