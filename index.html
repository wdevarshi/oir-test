<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIR Practice — AFSB Preparation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OIR Practice</h1>
            <p>Air Force Selection Board Preparation</p>
            <p class="personal">Target: May 4, 2026</p>
        </div>

        <!-- Countdown Hero -->
        <div class="countdown-hero" role="status" aria-label="Countdown to AFSB">
            <div class="countdown-days" id="countdown" aria-live="polite">—</div>
            <div class="countdown-label">days until AFSB</div>
        </div>

        <div class="stats-section" role="region" aria-label="Progress overview">
            <h2>Progress</h2>
            <div id="overallStats" class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Tests</div>
                    <div class="stat-value" id="testsTaken">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Average</div>
                    <div class="stat-value" id="avgScore">–</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Best</div>
                    <div class="stat-value" id="bestScore">–</div>
                </div>
            </div>
        </div>

        <div class="tests-section">
            <div id="testsGrid">
                <!-- Test groups will be injected here -->
            </div>
        </div>

        <div class="actions-section">
            <button class="action-btn" onclick="location.href='dashboard.html'" aria-label="View dashboard">
                Dashboard
            </button>
            <button class="action-btn secondary" onclick="startRandomTest()" aria-label="Start a random test">
                Random Test
            </button>
        </div>

        <div class="footer">
            <p>Created with 🧈 by Tofu</p>
        </div>
    </div>

    <script src="storage.js"></script>
    <script>
        function escapeHTMLIdx(str) {
            if (typeof str !== 'string') return String(str);
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Load test status and stats on page load
        window.addEventListener('DOMContentLoaded', function() {
            loadStats();
            loadTests();
            updateCountdown();
        });

        function updateCountdown() {
            const target = new Date('2026-05-04T00:00:00+05:30');
            const now = new Date();
            const diff = target - now;
            const el = document.getElementById('countdown');
            if (!el) return;
            if (diff <= 0) {
                el.textContent = '0';
                document.querySelector('.countdown-label').textContent = 'AFSB time — go get it!';
            } else {
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                el.innerHTML = days + '<span class="countdown-unit">d</span>';
            }
        }

        function loadStats() {
            const stats = getOverallStats();
            
            if (stats) {
                document.getElementById('testsTaken').textContent = stats.testsTaken;
                document.getElementById('avgScore').textContent = stats.avgScore + '%';
                document.getElementById('bestScore').textContent = stats.bestScore + '/50';
            }
        }

        function loadTests() {
            const testsContainer = document.getElementById('testsGrid');
            const testResults = getTestResults();
            
            // Define available tests
            const tests = [
                { id: 1, title: 'OIR Mock Test 1', difficulty: 'Medium' },
                { id: 2, title: 'OIR Mock Test 2', difficulty: 'Medium' },
                { id: 3, title: 'OIR Mock Test 3', difficulty: 'Medium' },
                { id: 4, title: 'OIR Mock Test 4', difficulty: 'Medium' },
                { id: 5, title: 'OIR Mock Test 5', difficulty: 'Medium' },
                { id: 6, title: 'OIR Mock Test 6', difficulty: 'Medium' },
                { id: 7, title: 'OIR Mock Test 7', difficulty: 'Medium' },
                { id: 8, title: 'OIR Mock Test 8', difficulty: 'Medium' },
                { id: 9, title: 'OIR Mock Test 9', difficulty: 'Medium' },
                { id: 10, title: 'OIR Mock Test 10', difficulty: 'Medium' },
                { id: 11, title: 'OIR Mock Test 11', difficulty: 'Medium-Hard' },
                { id: 12, title: 'OIR Mock Test 12', difficulty: 'Medium-Hard' },
                { id: 13, title: 'OIR Mock Test 13', difficulty: 'Medium-Hard' },
                { id: 14, title: 'OIR Mock Test 14', difficulty: 'Medium-Hard' },
                { id: 15, title: 'OIR Mock Test 15', difficulty: 'Medium-Hard' },
                { id: 16, title: 'OIR Mock Test 16', difficulty: 'Hard' },
                { id: 17, title: 'OIR Mock Test 17', difficulty: 'Hard' },
                { id: 18, title: 'OIR Mock Test 18', difficulty: 'Hard' },
                { id: 19, title: 'OIR Mock Test 19', difficulty: 'Hard' },
                { id: 20, title: 'OIR Mock Test 20', difficulty: 'Hard' }
            ];

            // Group tests by difficulty
            const groups = [
                { key: 'medium', label: 'Medium', emoji: '◆', tests: tests.filter(t => t.difficulty === 'Medium') },
                { key: 'medium-hard', label: 'Medium-Hard', emoji: '◆◆', tests: tests.filter(t => t.difficulty === 'Medium-Hard') },
                { key: 'hard', label: 'Hard', emoji: '◆◆◆', tests: tests.filter(t => t.difficulty === 'Hard') }
            ];

            testsContainer.innerHTML = '';

            groups.forEach((group, groupIdx) => {
                const completedInGroup = group.tests.filter(t => testResults.some(r => r.testId === t.id)).length;
                const progressPct = group.tests.length > 0 ? Math.round((completedInGroup / group.tests.length) * 100) : 0;

                const groupDiv = document.createElement('div');
                groupDiv.className = 'difficulty-group';
                
                // Collapsible header
                const headerDiv = document.createElement('div');
                headerDiv.className = 'difficulty-group-header';
                headerDiv.innerHTML = `
                    <span class="group-chevron" id="chevron-${group.key}">›</span>
                    <span class="difficulty-group-label">${group.label}</span>
                    <span class="group-progress">${completedInGroup}/${group.tests.length}</span>
                    <div class="group-progress-bar">
                        <div class="group-progress-fill" style="width: ${progressPct}%"></div>
                    </div>
                `;
                
                headerDiv.addEventListener('click', function() {
                    const body = groupDiv.querySelector('.difficulty-group-body');
                    const chevron = document.getElementById('chevron-' + group.key);
                    body.classList.toggle('collapsed');
                    chevron.classList.toggle('open');
                });
                
                groupDiv.appendChild(headerDiv);

                // Collapsible body — start collapsed by default
                const bodyDiv = document.createElement('div');
                bodyDiv.className = 'difficulty-group-body collapsed';

                const grid = document.createElement('div');
                grid.className = 'tests-compact-grid';

                group.tests.forEach(test => {
                    const results = testResults.filter(r => r.testId === test.id);
                    const bestScore = results.length > 0 ? Math.max(...results.map(r => r.score)) : null;
                    const bestPercentage = results.length > 0 ? Math.max(...results.map(r => r.percentage)) : null;
                    const attemptCount = results.length;
                    const testNum = test.id;

                    const card = document.createElement('div');
                    card.className = 'test-card';
                    card.setAttribute('role', 'button');
                    card.setAttribute('tabindex', '0');
                    card.setAttribute('aria-label', 'Test ' + testNum + (attemptCount > 0 ? ', best score ' + bestScore + ' out of 50' : ', not yet attempted'));
                    if (attemptCount > 0) card.classList.add('completed');
                    
                    card.innerHTML = `
                        <div class="card-top">
                            <span class="test-num">${testNum}</span>
                            ${attemptCount > 0 
                                ? '<span class="card-check">✓</span>' 
                                : '<span class="card-new">NEW</span>'}
                        </div>
                        ${attemptCount > 0 
                            ? `<div class="card-score">${bestScore}/50 · ${bestPercentage}%</div>` 
                            : ''}
                        <div class="card-bottom">
                            <span class="card-action">${attemptCount > 0 ? 'Retake →' : 'Start →'}</span>
                            ${attemptCount > 0 
                                ? `<a href="javascript:void(0)" class="results-link" onclick="event.stopPropagation(); viewResults(${test.id})" aria-label="View results for test ${testNum}">results</a>` 
                                : ''}
                        </div>
                    `;
                    
                    card.addEventListener('click', function() {
                        startTest(test.id);
                    });
                    card.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            startTest(test.id);
                        }
                    });

                    grid.appendChild(card);
                });

                bodyDiv.appendChild(grid);
                groupDiv.appendChild(bodyDiv);
                testsContainer.appendChild(groupDiv);
            });

            // Auto-expand the first group that has incomplete tests, or the first group
            const firstIncomplete = groups.findIndex(g => {
                const completedInGroup = g.tests.filter(t => testResults.some(r => r.testId === t.id)).length;
                return completedInGroup < g.tests.length;
            });
            const expandIdx = firstIncomplete >= 0 ? firstIncomplete : 0;
            const allGroups = testsContainer.querySelectorAll('.difficulty-group');
            if (allGroups[expandIdx]) {
                const body = allGroups[expandIdx].querySelector('.difficulty-group-body');
                const chevron = allGroups[expandIdx].querySelector('.group-chevron');
                if (body) body.classList.remove('collapsed');
                if (chevron) chevron.classList.add('open');
            }
        }

        function startTest(testId) {
            window.location.href = `test.html?testId=${testId}`;
        }

        function startRandomTest() {
            const testResults = getTestResults();
            const allTests = Array.from({length: 20}, (_, i) => i + 1);
            
            // Try to find an untaken test first
            const takenTests = new Set(testResults.map(r => r.testId));
            const untakenTests = allTests.filter(id => !takenTests.has(id));
            
            let randomTestId;
            if (untakenTests.length > 0) {
                randomTestId = untakenTests[Math.floor(Math.random() * untakenTests.length)];
            } else {
                randomTestId = allTests[Math.floor(Math.random() * allTests.length)];
            }
            
            startTest(randomTestId);
        }

        function viewResults(testId) {
            window.location.href = `dashboard.html?testId=${testId}`;
        }
    </script>
</body>
</html>
